<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Singwithme — Music for everyone</title>
<meta name="description" content="Singwithme is a modern music streaming experience." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --bg:#0a0a0a; --sidebar:#000; --surface:#181818; --surface-hover:#252525;
    --text:#fff; --text-sub:#b3b3b3; --brand:#1ed760; --brand-hover:#1fdf64;
    --border:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:#000;color:var(--text);
    -webkit-font-smoothing:antialiased;overflow:hidden;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  .display{font-family:'Montserrat',sans-serif;font-weight:800;letter-spacing:-.02em}

  /* Layout */
  .app{height:100vh;display:flex;flex-direction:column;background:#000}
  .main{flex:1;display:flex;gap:8px;padding:8px;min-height:0}
  .sidebar{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
  .sidebar-card{background:var(--sidebar);border-radius:8px;padding:8px}
  .logo{display:flex;align-items:center;gap:10px;padding:14px 12px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:20px}
  .logo svg{color:var(--brand)}
  .nav-item{display:flex;align-items:center;gap:16px;padding:10px 12px;border-radius:6px;font-weight:700;font-size:14px;color:var(--text-sub);transition:color .15s}
  .nav-item:hover,.nav-item.active{color:var(--text)}
  .library{flex:1;display:flex;flex-direction:column;min-height:0}
  .library-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
  .library-head-title{display:flex;align-items:center;gap:12px;color:var(--text-sub);font-weight:700;font-size:14px}
  .library-head-title:hover{color:var(--text)}
  .icon-btn{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:var(--text-sub);transition:all .15s}
  .icon-btn:hover{color:var(--text);background:var(--surface-hover)}
  .playlist-list{flex:1;overflow-y:auto;padding:0 8px 8px;display:flex;flex-direction:column;gap:2px}
  .playlist-item{display:flex;align-items:center;gap:12px;padding:8px;border-radius:6px;transition:background .15s;cursor:pointer}
  .playlist-item:hover{background:var(--surface-hover)}
  .playlist-thumb{width:48px;height:48px;border-radius:4px;flex-shrink:0;background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--text-sub);object-fit:cover}
  .playlist-thumb.liked{background:linear-gradient(135deg,#7c3aed,#f0abfc);color:#fff}
  .playlist-meta{min-width:0}
  .playlist-meta .t{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .playlist-meta .s{font-size:12px;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .content{flex:1;background:var(--bg);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;min-width:0}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;flex-shrink:0;position:sticky;top:0;z-index:10;background:rgba(10,10,10,.6);backdrop-filter:blur(12px)}
  .nav-arrows{display:flex;gap:8px}
  .nav-arrow{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;transition:background .15s}
  .nav-arrow:hover{background:rgba(0,0,0,.9)}
  .topbar-right{display:flex;align-items:center;gap:16px}
  .top-link{font-weight:700;font-size:14px;color:var(--text-sub);transition:transform .15s,color .15s}
  .top-link:hover{color:var(--text);transform:scale(1.05)}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--brand);color:#000;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center}
  .scroll{flex:1;overflow-y:auto}

  /* Hero gradient */
  .hero{background:linear-gradient(180deg,#1f6e3a 0%,var(--bg) 80%);padding:32px 24px 24px}
  .hero h1{font-size:32px;margin-bottom:24px}
  .quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .quick-tile{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.1);border-radius:6px;overflow:hidden;transition:background .15s;cursor:pointer}
  .quick-tile:hover{background:rgba(255,255,255,.2)}
  .quick-tile img{width:64px;height:64px;object-fit:cover;flex-shrink:0}
  .quick-tile span{font-weight:700;font-size:14px;padding-right:16px}

  /* Sections */
  .section{padding:24px}
  .section-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px}
  .section-head h2{font-size:24px;cursor:pointer}
  .section-head h2:hover{text-decoration:underline}
  .show-all{font-size:12px;font-weight:700;color:var(--text-sub)}
  .show-all:hover{text-decoration:underline}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px}

  .card{background:#181818;border-radius:8px;padding:16px;transition:background .2s;cursor:pointer;position:relative}
  .card:hover{background:#252525}
  .card-cover{position:relative;margin-bottom:16px}
  .card-cover img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  .card-play{position:absolute;bottom:8px;right:8px;width:48px;height:48px;border-radius:50%;background:var(--brand);color:#000;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 16px rgba(0,0,0,.4);opacity:0;transform:translateY(8px);transition:all .2s}
  .card:hover .card-play,.card-play.visible{opacity:1;transform:translateY(0)}
  .card-play:hover{transform:scale(1.05);background:var(--brand-hover)}
  .card-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-sub{font-size:12px;color:var(--text-sub);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

  /* Playlist page */
  .pl-hero{display:flex;align-items:flex-end;gap:24px;padding:40px 24px 24px;background:linear-gradient(180deg,#1a4f2a 0%,var(--bg) 100%)}
  .pl-hero img{width:208px;height:208px;object-fit:cover;border-radius:4px;box-shadow:0 16px 48px rgba(0,0,0,.6)}
  .pl-hero-info{min-width:0}
  .pl-hero-info .kicker{font-size:12px;font-weight:700;text-transform:uppercase}
  .pl-hero-info h1{font-size:64px;margin:12px 0;line-height:1}
  .pl-hero-info .meta{font-size:14px;color:var(--text-sub)}
  .pl-hero-info .meta strong{color:var(--text);font-weight:600}
  .pl-actions{padding:24px;background:linear-gradient(180deg,rgba(0,0,0,.4),transparent)}
  .play-btn{width:56px;height:56px;border-radius:50%;background:var(--brand);color:#000;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 16px rgba(0,0,0,.4);transition:all .15s}
  .play-btn:hover{transform:scale(1.05);background:var(--brand-hover)}
  .track-list{padding:0 24px 24px}
  .track-head,.track-row{display:grid;grid-template-columns:24px 4fr 3fr 40px 80px;gap:16px;padding:8px 16px;align-items:center}
  .dl-btn{background:none;border:none;color:var(--text-sub);cursor:pointer;padding:6px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .dl-btn:hover{color:var(--text);background:var(--surface-hover)}
  .track-head{border-bottom:1px solid var(--border);color:var(--text-sub);font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
  .track-row{border-radius:4px;cursor:pointer}
  .track-row:hover{background:var(--surface-hover)}
  .track-num{color:var(--text-sub);font-size:14px;text-align:center;font-variant-numeric:tabular-nums}
  .track-row:hover .track-num{display:none}
  .track-play{display:none;color:var(--text)}
  .track-row:hover .track-play{display:block}
  .track-info{display:flex;align-items:center;gap:12px;min-width:0}
  .track-info img{width:40px;height:40px;border-radius:4px;object-fit:cover;flex-shrink:0}
  .track-info .ti-meta{min-width:0}
  .ti-title{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ti-title.current{color:var(--brand)}
  .ti-artist{font-size:12px;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track-album,.track-time{font-size:14px;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track-time{text-align:right;font-variant-numeric:tabular-nums}

  /* Search */
  .search-input-wrap{position:relative;max-width:380px;margin-bottom:32px}
  .search-input-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-sub)}
  .search-input{width:100%;background:var(--surface);color:var(--text);border:none;border-radius:500px;padding:12px 16px 12px 44px;font-size:14px;outline:none;font-family:inherit}
  .search-input:focus{outline:2px solid #fff3}
  .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
  .cat-card{aspect-ratio:1.5;border-radius:8px;padding:16px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:22px;cursor:pointer;transition:filter .15s;color:#fff}
  .cat-card:hover{filter:brightness(1.1)}

  /* Player bar */
  .player{height:90px;background:#000;border-top:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:16px;flex-shrink:0}
  .player-left{display:flex;align-items:center;gap:14px;width:30%;min-width:0}
  .player-left img{width:56px;height:56px;border-radius:4px;object-fit:cover;flex-shrink:0}
  .pl-info{min-width:0}
  .pl-info .t{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
  .pl-info .t:hover{text-decoration:underline}
  .pl-info .a{font-size:11px;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
  .pl-info .a:hover{color:var(--text);text-decoration:underline}
  .player-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;max-width:722px;margin:0 auto}
  .controls{display:flex;align-items:center;gap:20px}
  .ctrl-btn{color:var(--text-sub);transition:color .15s;display:flex;align-items:center}
  .ctrl-btn:hover{color:var(--text)}
  .ctrl-btn.active{color:var(--brand)}
  .play-main{width:36px;height:36px;border-radius:50%;background:#fff;color:#000;display:flex;align-items:center;justify-content:center;transition:transform .15s}
  .play-main:hover{transform:scale(1.06)}
  .progress{display:flex;align-items:center;gap:8px;width:100%}
  .time{font-size:11px;color:var(--text-sub);font-variant-numeric:tabular-nums;min-width:40px;text-align:right}
  .time:last-child{text-align:left}
  .player-right{display:flex;align-items:center;gap:8px;width:30%;justify-content:flex-end;color:var(--text-sub)}
  .vol-slider{width:96px}

  input[type=range]{
    -webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;outline:none;cursor:pointer;
    background:linear-gradient(to right,#fff var(--p,0%),rgba(255,255,255,.3) var(--p,0%))
  }
  input[type=range]:hover{background:linear-gradient(to right,var(--brand) var(--p,0%),rgba(255,255,255,.3) var(--p,0%))}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;opacity:0;transition:opacity .15s}
  input[type=range]:hover::-webkit-slider-thumb{opacity:1}
  input[type=range]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#fff;border:none;opacity:0}
  input[type=range]:hover::-moz-range-thumb{opacity:1}

  .scroll::-webkit-scrollbar,.playlist-list::-webkit-scrollbar{width:12px}
  .scroll::-webkit-scrollbar-thumb,.playlist-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:6px;border:3px solid transparent;background-clip:padding-box}
  .scroll::-webkit-scrollbar-thumb:hover,.playlist-list::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.3);background-clip:padding-box}

  .footer{padding:60px 24px 24px;font-size:12px;color:var(--text-sub)}
  .hidden{display:none!important}
  .empty{padding:48px;text-align:center;color:var(--text-sub)}

  @media (max-width:768px){
    .sidebar{display:none}
    .pl-hero{flex-direction:column;align-items:flex-start;padding:24px}
    .pl-hero h1{font-size:40px}
    .player-right{display:none}
    .player-left{width:50%}
    .track-head,.track-row{grid-template-columns:24px 1fr 40px 60px}
    .track-album{display:none}
  }
</style>
</head>
<body>
<div class="app">
  <div class="main">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-card">
        <a href="#/" class="logo">
          <i data-lucide="music-2"></i>
          <span>Singwithme</span>
        </a>
        <nav style="display:flex;flex-direction:column;gap:4px;margin-top:8px">
          <a href="#/" class="nav-item" data-nav="home"><i data-lucide="home"></i>Home</a>
          <a href="#/search" class="nav-item" data-nav="search"><i data-lucide="search"></i>Search</a>
        </nav>
      </div>
      <div class="sidebar-card library">
        <div class="library-head">
          <button class="library-head-title"><i data-lucide="library"></i>Your Library</button>
          <button class="icon-btn"><i data-lucide="plus"></i></button>
        </div>
        <div class="playlist-list" id="playlist-list"></div>
      </div>
    </aside>

    <!-- Content -->
    <main class="content">
      <header class="topbar">
        <div class="nav-arrows">
          <button class="nav-arrow" onclick="history.back()"><i data-lucide="chevron-left"></i></button>
          <button class="nav-arrow" onclick="history.forward()"><i data-lucide="chevron-right"></i></button>
        </div>
        <div class="topbar-right">
          <a class="top-link" href="#/">Premium</a>
          <a class="top-link" href="#/">Support</a>
          <span style="width:1px;height:24px;background:var(--border)"></span>
          <div class="avatar">S</div>
        </div>
      </header>
      <div class="scroll" id="view"></div>
    </main>
  </div>

  <!-- Player -->
  <div class="player">
    <div class="player-left" id="pl-left">
      <div style="font-size:14px;color:var(--text-sub)">Select a song to play</div>
    </div>
    <div class="player-center">
      <div class="controls">
        <button class="ctrl-btn" id="shuffle-btn" title="Shuffle"><i data-lucide="shuffle" style="width:18px;height:18px"></i></button>
        <button class="ctrl-btn" onclick="prevSong()" title="Previous"><i data-lucide="skip-back" fill="currentColor" style="width:20px;height:20px"></i></button>
        <button class="play-main" onclick="togglePlay()" id="play-main"><i data-lucide="play" fill="currentColor" style="width:18px;height:18px;margin-left:2px"></i></button>
        <button class="ctrl-btn" onclick="nextSong()" title="Next"><i data-lucide="skip-forward" fill="currentColor" style="width:20px;height:20px"></i></button>
        <button class="ctrl-btn" id="repeat-btn" title="Repeat"><i data-lucide="repeat" style="width:18px;height:18px"></i></button>
      </div>
      <div class="progress">
        <span class="time" id="time-cur">0:00</span>
        <input type="range" id="seek" min="0" max="0" value="0" />
        <span class="time" id="time-dur">0:00</span>
      </div>
    </div>
    <div class="player-right">
      <button class="ctrl-btn" id="mute-btn"><i data-lucide="volume-2" style="width:16px;height:16px"></i></button>
      <input type="range" id="volume" class="vol-slider" min="0" max="1" step="0.01" value="0.8" />
    </div>
  </div>
</div>

<audio id="audio"></audio>

];
const SONGS = RAW.map((r,i)=>({id:String(i),url:r[0],title:r[1],album:r[2],artist:"Anirudh",cover:COVERS[i%COVERS.length]}));
const PLAYLISTS = [
  {name:"Today's Top Hits",description:"The hottest tracks right now",filter:s=>s.album==="Hits"},
  {name:"Romance Vibes",description:"Love songs to set the mood",filter:s=>s.album==="Romance"},
  {name:"Mass Anthems",description:"Energy on full volume",filter:s=>s.album==="Mass"},
  {name:"Soulful Sessions",description:"Slow it down",filter:s=>s.album==="Soulful"},
  {name:"Festive Mood",description:"Celebrate every day",filter:s=>s.album==="Festive"},
  {name:"All Tracks",description:"The complete library",filter:_=>true},
];
const CAT_COLORS=["#dc148c","#0d73ec","#e91429","#1e3264","#8d67ab","#509bf5","#e8115b"];

/* ============== STATE ============== */
const state={queue:SONGS.slice(),index:-1,shuffle:false,repeat:false};
const audio=document.getElementById("audio");
audio.volume=0.8;

/* ============== PLAYER ============== */
function playSong(song,queue){
  if(queue) state.queue=queue;
  state.index=state.queue.findIndex(s=>s.id===song.id);
  audio.src=song.url;
  audio.play().catch(()=>{});
  renderPlayerLeft();
  refreshTrackHighlights();
}
function togglePlay(){
  if(state.index===-1){ if(state.queue.length) playSong(state.queue[0]); return; }
  if(audio.paused) audio.play(); else audio.pause();
}
function nextSong(){
  if(!state.queue.length) return;
  const i=state.shuffle?Math.floor(Math.random()*state.queue.length):(state.index+1)%state.queue.length;
  playSong(state.queue[i]);
}
function prevSong(){
  if(!state.queue.length) return;
  if(audio.currentTime>3){audio.currentTime=0;return;}
  const i=state.index<=0?state.queue.length-1:state.index-1;
  playSong(state.queue[i]);
}
audio.addEventListener("timeupdate",()=>{
  const seek=document.getElementById("seek");
  seek.max=audio.duration||0;
  seek.value=audio.currentTime;
  setRangeFill(seek);
  document.getElementById("time-cur").textContent=fmt(audio.currentTime);
});
audio.addEventListener("loadedmetadata",()=>{
  document.getElementById("time-dur").textContent=fmt(audio.duration);
});
audio.addEventListener("play",()=>updatePlayIcon(true));
audio.addEventListener("pause",()=>updatePlayIcon(false));
audio.addEventListener("ended",()=>{
  if(state.repeat){audio.currentTime=0;audio.play();} else nextSong();
});

document.getElementById("seek").addEventListener("input",e=>{audio.currentTime=+e.target.value;setRangeFill(e.target)});
document.getElementById("volume").addEventListener("input",e=>{audio.volume=+e.target.value;setRangeFill(e.target);updateMuteIcon()});
document.getElementById("mute-btn").addEventListener("click",()=>{
  audio.muted=!audio.muted; updateMuteIcon();
});
document.getElementById("shuffle-btn").addEventListener("click",function(){
  state.shuffle=!state.shuffle; this.classList.toggle("active",state.shuffle);
});
document.getElementById("repeat-btn").addEventListener("click",function(){
  state.repeat=!state.repeat; this.classList.toggle("active",state.repeat);
});

function updatePlayIcon(playing){
  const el=document.getElementById("play-main");
  el.innerHTML = playing
    ? '<i data-lucide="pause" fill="currentColor" style="width:18px;height:18px"></i>'
    : '<i data-lucide="play" fill="currentColor" style="width:18px;height:18px;margin-left:2px"></i>';
  lucide.createIcons();
}
function updateMuteIcon(){
  const el=document.getElementById("mute-btn");
  const v=audio.muted||audio.volume===0?"volume-x":"volume-2";
  el.innerHTML=`<i data-lucide="${v}" style="width:16px;height:16px"></i>`;
  lucide.createIcons();
}
function setRangeFill(input){
  const min=+input.min||0,max=+input.max||1,val=+input.value;
  const p=max>min?((val-min)/(max-min))*100:0;
  input.style.setProperty("--p",p+"%");
}
function fmt(s){if(!isFinite(s))return"0:00";const m=Math.floor(s/60),ss=Math.floor(s%60);return m+":"+String(ss).padStart(2,"0")}

function renderPlayerLeft(){
  const cur=state.index>=0?state.queue[state.index]:null;
  const el=document.getElementById("pl-left");
  if(!cur){el.innerHTML='<div style="font-size:14px;color:var(--text-sub)">Select a song to play</div>';return}
  el.innerHTML=`
    <img src="${cur.cover}" alt="" />
    <div class="pl-info">
      <div class="t">${esc(cur.title)}</div>
      <div class="a">${esc(cur.artist)}</div>
    </div>
    <button class="ctrl-btn" style="margin-left:8px"><i data-lucide="heart" style="width:16px;height:16px"></i></button>
  `;
  lucide.createIcons();
}

/* ============== ROUTING & VIEWS ============== */
const view=document.getElementById("view");
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}

function navActive(name){
  document.querySelectorAll("[data-nav]").forEach(a=>a.classList.toggle("active",a.dataset.nav===name));
}

function songCardHTML(s){
  return `<div class="card" data-play="${s.id}">
    <div class="card-cover">
      <img src="${s.cover}" alt="${esc(s.title)}" loading="lazy" />
      <button class="card-play" data-play="${s.id}"><i data-lucide="play" fill="currentColor" style="width:20px;height:20px;margin-left:2px"></i></button>
    </div>
    <div class="card-title">${esc(s.title)}</div>
    <div class="card-sub">${esc(s.artist)}</div>
  </div>`;
}
function plCardHTML(p,cover){
  return `<a class="card" href="#/playlist/${encodeURIComponent(p.name)}">
    <div class="card-cover">
      <img src="${cover}" alt="${esc(p.name)}" loading="lazy" />
      <span class="card-play"><i data-lucide="play" fill="currentColor" style="width:20px;height:20px;margin-left:2px"></i></span>
    </div>
    <div class="card-title">${esc(p.name)}</div>
    <div class="card-sub">${esc(p.description)}</div>
  </a>`;
}

function renderHome(){
  navActive("home");
  const h=new Date().getHours();
  const greet=h<12?"Good morning":h<18?"Good afternoon":"Good evening";
  const trending=SONGS.slice(0,6);
  const more=SONGS.slice(6,12);
  view.innerHTML=`
    <div class="hero">
      <h1 class="display">${greet}</h1>
      <div class="quick-grid">
        ${PLAYLISTS.slice(0,6).map((p,i)=>`
          <a class="quick-tile" href="#/playlist/${encodeURIComponent(p.name)}">
            <img src="${SONGS[i*3].cover}" alt="" />
            <span>${esc(p.name)}</span>
          </a>`).join("")}
      </div>
    </div>
    <section class="section">
      <div class="section-head"><h2 class="display">Trending now</h2><a class="show-all" href="#/playlist/All Tracks">Show all</a></div>
      <div class="grid">${trending.map(songCardHTML).join("")}</div>
    </section>
    <section class="section">
      <div class="section-head"><h2 class="display">Made for you</h2><span class="show-all">Show all</span></div>
      <div class="grid">${PLAYLISTS.map((p,i)=>plCardHTML(p,SONGS[(i*4+1)%SONGS.length].cover)).join("")}</div>
    </section>
    <section class="section">
      <div class="section-head"><h2 class="display">Recommended</h2><span class="show-all">Show all</span></div>
      <div class="grid">${more.map(songCardHTML).join("")}</div>
    </section>
    <footer class="footer">© ${new Date().getFullYear()} Singwithme. Crafted with love for music lovers.</footer>
  `;
  lucide.createIcons();
  attachCardPlay(SONGS);
}

function renderSearch(){
  navActive("search");
  view.innerHTML=`
    <div class="section">
      <div class="search-input-wrap">
        <i data-lucide="search" style="width:18px;height:18px"></i>
        <input id="q" class="search-input" placeholder="What do you want to play?" autofocus />
      </div>
      <div id="results"></div>
    </div>
  `;
  lucide.createIcons();
  const cats=["Hits","Romance","Mass","Soulful","Festive","Devotional","Dance","Singles","Chillax"];
  const renderResults=q=>{
    const res=document.getElementById("results");
    if(!q.trim()){
      res.innerHTML=`
        <h2 class="display" style="font-size:24px;margin-bottom:16px">Browse all</h2>
        <div class="cat-grid">${cats.map((c,i)=>`<a class="cat-card" style="background:${CAT_COLORS[i%CAT_COLORS.length]}" href="#/playlist/${encodeURIComponent(c==="Hits"?"Today's Top Hits":c==="Romance"?"Romance Vibes":c==="Mass"?"Mass Anthems":c==="Soulful"?"Soulful Sessions":c==="Festive"?"Festive Mood":"All Tracks")}">${c}</a>`).join("")}</div>`;
      return;
    }
    const n=q.toLowerCase();
    const found=SONGS.filter(s=>s.title.toLowerCase().includes(n)||s.album.toLowerCase().includes(n)||s.artist.toLowerCase().includes(n));
    res.innerHTML=`<h2 class="display" style="font-size:24px;margin-bottom:16px">${found.length} result${found.length===1?"":"s"}</h2>
      <div class="grid">${found.map(songCardHTML).join("")}</div>`;
    lucide.createIcons();
    attachCardPlay(found);
  };
  document.getElementById("q").addEventListener("input",e=>renderResults(e.target.value));
  renderResults("");
}

function renderPlaylist(name){
  navActive(null);
  const decoded=decodeURIComponent(name);
  const p=PLAYLISTS.find(x=>x.name===decoded);
  const tracks=p?SONGS.filter(p.filter):SONGS;
  const cover=tracks[0]?.cover||SONGS[0].cover;
  view.innerHTML=`
    <div class="pl-hero">
      <img src="${cover}" alt="" />
      <div class="pl-hero-info">
        <div class="kicker">Playlist</div>
        <h1 class="display">${esc(decoded)}</h1>
        <div class="meta">${esc(p?.description||"Curated playlist")} · <strong>Singwithme</strong> · ${tracks.length} songs</div>
      </div>
    </div>
    <div class="pl-actions" style="display:flex;align-items:center;gap:16px">
      <button class="play-btn" id="pl-play"><i data-lucide="play" fill="currentColor" style="width:24px;height:24px;margin-left:3px"></i></button>
      <button id="pl-shuffle" title="Shuffle play" style="background:none;border:none;color:var(--text-sub);cursor:pointer;padding:8px;display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600"><i data-lucide="shuffle" style="width:24px;height:24px"></i><span>Shuffle</span></button>
    </div>
    <div class="track-list">
      <div class="track-head"><div>#</div><div>Title</div><div>Album</div><div></div><div style="text-align:right"><i data-lucide="clock" style="width:16px;height:16px"></i></div></div>
      ${tracks.map((s,i)=>`
        <div class="track-row" data-play="${s.id}">
          <div>
            <span class="track-num">${i+1}</span>
            <span class="track-play"><i data-lucide="play" fill="currentColor" style="width:14px;height:14px"></i></span>
          </div>
          <div class="track-info">
            <img src="${s.cover}" alt="" loading="lazy" />
            <div class="ti-meta">
              <div class="ti-title" data-id="${s.id}">${esc(s.title)}</div>
              <div class="ti-artist">${esc(s.artist)}</div>
            </div>
          </div>
          <div class="track-album">${esc(s.album)}</div>
          <div><button class="dl-btn" data-dl="${s.id}" title="Download"><i data-lucide="download" style="width:16px;height:16px"></i></button></div>
          <div class="track-time">—</div>
        </div>
      `).join("")}
    </div>
    <div style="height:24px"></div>
  `;
  lucide.createIcons();
  document.getElementById("pl-play").addEventListener("click",()=>{
    if(state.queue===tracks && state.index>=0){togglePlay();return;}
    playSong(tracks[0],tracks);
  });
  document.getElementById("pl-shuffle").addEventListener("click",()=>{
    state.shuffle=true;
    document.getElementById("shuffle-btn")?.classList.add("active");
    const shuffled=tracks.slice().sort(()=>Math.random()-0.5);
    playSong(shuffled[0],shuffled);
  });
  attachCardPlay(tracks);
  view.querySelectorAll("[data-dl]").forEach(btn=>{
    btn.addEventListener("click",async e=>{
      e.preventDefault(); e.stopPropagation();
      const s=tracks.find(x=>x.id===btn.dataset.dl); if(!s) return;
      const icon=btn.innerHTML; btn.innerHTML='<i data-lucide="loader" style="width:16px;height:16px"></i>'; lucide.createIcons();
      try{
        const r=await fetch(s.url); const blob=await r.blob();
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a"); a.href=url; a.download=`${s.title}.mp3`; document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=>URL.revokeObjectURL(url),1000);
        btn.innerHTML='<i data-lucide="check" style="width:16px;height:16px"></i>'; lucide.createIcons();
      }catch{ btn.innerHTML=icon; lucide.createIcons(); alert("Download failed"); }
    });
  });
  refreshTrackHighlights();
}

function attachCardPlay(queue){
  view.querySelectorAll("[data-play]").forEach(el=>{
    el.addEventListener("click",e=>{
      e.preventDefault(); e.stopPropagation();
      const id=el.dataset.play;
      const s=queue.find(x=>x.id===id)||SONGS.find(x=>x.id===id);
      if(!s) return;
      if(state.index>=0 && state.queue[state.index]?.id===s.id){togglePlay();return;}
      playSong(s,queue);
    });
  });
}
function refreshTrackHighlights(){
  const cur=state.index>=0?state.queue[state.index]:null;
  view.querySelectorAll(".ti-title").forEach(el=>{
    el.classList.toggle("current",cur && el.dataset.id===cur.id);
  });
}

/* ============== ROUTER ============== */
function route(){
  const h=location.hash||"#/";
  if(h.startsWith("#/playlist/")) renderPlaylist(h.slice("#/playlist/".length));
  else if(h==="#/search") renderSearch();
  else renderHome();
  view.scrollTop=0;
}
window.addEventListener("hashchange",route);

/* ============== INIT ============== */
function renderSidebarPlaylists(){
  const el=document.getElementById("playlist-list");
  el.innerHTML=`
    <a class="playlist-item" href="#/playlist/All%20Tracks">
      <div class="playlist-thumb liked"><i data-lucide="heart" fill="currentColor" style="width:20px;height:20px"></i></div>
      <div class="playlist-meta"><div class="t">Liked Songs</div><div class="s">Playlist</div></div>
    </a>
    ${PLAYLISTS.map(p=>`
      <a class="playlist-item" href="#/playlist/${encodeURIComponent(p.name)}">
        <div class="playlist-thumb"><i data-lucide="music-2" style="width:20px;height:20px"></i></div>
        <div class="playlist-meta"><div class="t">${esc(p.name)}</div><div class="s">Playlist · Singwithme</div></div>
      </a>`).join("")}
  `;
  lucide.createIcons();
}

renderSidebarPlaylists();
route();
setRangeFill(document.getElementById("volume"));
setRangeFill(document.getElementById("seek"));
lucide.createIcons();
</script>
</body>
</html>
